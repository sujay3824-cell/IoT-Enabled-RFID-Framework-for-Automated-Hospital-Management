<!DOCTYPE html>
<html>
<head>
    <title>City Hospital — Login</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Inter',sans-serif;
            background: radial-gradient(ellipse at top, #0d2137 0%, #080c14 60%);
            height:100vh; display:flex; justify-content:center; align-items:center; overflow:hidden;
        }
        .glow { position:fixed; width:600px; height:600px;
            background:radial-gradient(circle, rgba(0,212,255,0.07) 0%, transparent 70%);
            top:-100px; left:50%; transform:translateX(-50%); pointer-events:none; }
        .wrapper { display:flex; flex-direction:column; align-items:center; gap:24px; width:100%; max-width:420px; padding:20px; }
        .logo { text-align:center; }
        .logo h1 { font-size:38px; font-weight:700;
            background:linear-gradient(135deg,#00d4ff,#ffffff);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; letter-spacing:1px; }
        .logo p { font-size:14px; color:rgba(255,255,255,0.4); margin-top:6px; }
        .card { background:rgba(255,255,255,0.04); backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,0.08); border-radius:24px;
            padding:40px 36px; width:100%; box-shadow:0 25px 80px rgba(0,0,0,0.5); }
        .card h2 { color:white; text-align:center; margin-bottom:28px; font-size:20px; font-weight:600; }
        .input-group { margin-bottom:16px; }
        .input-group label { display:block; color:rgba(255,255,255,0.5); margin-bottom:7px;
            font-size:12px; text-transform:uppercase; letter-spacing:0.5px; font-weight:500; }
        .input-group input { width:100%; padding:13px 16px;
            background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);
            border-radius:12px; color:white; font-size:15px; outline:none;
            transition:all 0.3s; font-family:inherit; }
        .input-group input:focus { border-color:rgba(0,212,255,0.5); background:rgba(0,212,255,0.05); }
        .input-group input::placeholder { color:rgba(255,255,255,0.25); }
        .btn { width:100%; padding:14px;
            background:linear-gradient(135deg,#00d4ff,#0066ff);
            border:none; border-radius:12px; color:white;
            font-size:16px; font-weight:600; cursor:pointer; font-family:inherit; transition:opacity 0.2s; }
        .btn:hover { opacity:0.88; }
        .error { background:rgba(255,80,80,0.15); border:1px solid rgba(255,80,80,0.3);
            color:#ff6b6b; padding:11px; border-radius:10px;
            text-align:center; margin-bottom:16px; font-size:13px; }
        .tags { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
        .tag { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08);
            color:rgba(255,255,255,0.4); padding:5px 14px; border-radius:20px; font-size:12px; }
        .clock { font-size:12px; color:rgba(255,255,255,0.25); text-align:center; }
    </style>
</head>
<body>
<div class="glow"></div>
<div class="wrapper">
    <div class="logo">
        <h1>🏥 City Hospital</h1>
        <p>Hospital Management System — Kiosk Terminal</p>
    </div>
    <div class="card">
        <h2>Welcome to City Hospital</h2>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form action="/login" method="post">
            <div class="input-group">
                <label>System Username</label>
                <input type="text" name="username" placeholder="Enter system username" required autocomplete="off">
            </div>
            <div class="input-group">
                <label>System Password</label>
                <input type="password" name="password" placeholder="Enter system password" required>
            </div>
            <button class="btn" type="submit">Access System →</button>
        </form>
    </div>
    <div class="tags">
        <span class="tag">📍 Main Lobby</span>
        <span class="tag">🔒 Secure Terminal</span>
        <span class="tag">24/7 Active</span>
    </div>
    <div class="clock" id="clock"></div>
</div>
<script>
function tick() {
    document.getElementById('clock').innerText = new Date().toLocaleString('en-IN',{
        weekday:'long',year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'
    });
}
tick(); setInterval(tick,1000);
</script>
</body>
</html>
