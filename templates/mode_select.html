<!DOCTYPE html>
<html>
<head>
    <title>Select Mode — City Hospital</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif;
            background:radial-gradient(ellipse at top,#0d2137 0%,#080c14 60%);
            min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
        .top-bar { position:fixed; top:0; left:0; right:0;
            background:rgba(13,27,42,0.9); backdrop-filter:blur(10px);
            border-bottom:1px solid rgba(0,212,255,0.1);
            padding:14px 30px; display:flex; justify-content:space-between; align-items:center; z-index:100; }
        .brand { font-size:18px; font-weight:700; color:#00d4ff; }
        .exit-btn { padding:6px 14px; background:rgba(255,255,255,0.05);
            border:1px solid rgba(255,255,255,0.12); color:rgba(255,255,255,0.6);
            border-radius:8px; cursor:pointer; font-size:12px; font-family:inherit; }
        .exit-btn:hover { background:rgba(255,80,80,0.2); color:#ff6b6b; }
        .content { text-align:center; margin-top:40px; }
        .title { font-size:32px; font-weight:700; color:white; margin-bottom:10px; }
        .subtitle { font-size:15px; color:rgba(255,255,255,0.4); margin-bottom:50px; }
        .modes { display:flex; gap:24px; flex-wrap:wrap; justify-content:center; }
        .mode-card { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08);
            border-radius:24px; padding:48px 40px; width:280px; cursor:pointer;
            text-decoration:none; color:white; transition:all 0.3s;
            display:flex; flex-direction:column; align-items:center; gap:16px; }
        .mode-card:hover { transform:translateY(-6px); }
        .mode-card.auto:hover   { border-color:rgba(56,239,125,0.4); background:rgba(56,239,125,0.05); }
        .mode-card.manual:hover { border-color:rgba(0,212,255,0.4);  background:rgba(0,212,255,0.05);  }
        .mode-icon  { font-size:56px; }
        .mode-title { font-size:22px; font-weight:700; }
        .mode-desc  { font-size:13px; color:rgba(255,255,255,0.45); text-align:center; line-height:1.6; }
        .mode-badge { padding:5px 16px; border-radius:20px; font-size:12px; font-weight:600; }
        .auto   .mode-badge { background:rgba(56,239,125,0.15); color:#38ef7d; border:1px solid rgba(56,239,125,0.3); }
        .manual .mode-badge { background:rgba(0,212,255,0.15);  color:#00d4ff; border:1px solid rgba(0,212,255,0.3);  }
        .clock { margin-top:40px; font-size:12px; color:rgba(255,255,255,0.2); }
    </style>
</head>
<body>
<div class="top-bar">
    <div class="brand">🏥 City Hospital</div>
    <button class="exit-btn" onclick="window.location.href='/logout'">↩️ Exit</button>
</div>
<div class="content">
    <div class="title">Select Access Mode</div>
    <div class="subtitle">Choose how you want to access the system</div>
    <div class="modes">
        <a href="/auto" class="mode-card auto">
            <div class="mode-icon">📡</div>
            <div class="mode-title">Automatic</div>
            <div class="mode-desc">Scan your RFID card and the system will automatically open your dashboard.</div>
            <div class="mode-badge">RFID Scan</div>
        </a>
        <a href="/manual" class="mode-card manual">
            <div class="mode-icon">🖐️</div>
            <div class="mode-title">Manual</div>
            <div class="mode-desc">Select your role and enter your username manually. Use if RFID is not responding.</div>
            <div class="mode-badge">Manual Entry</div>
        </a>
    </div>
    <div class="clock" id="clock"></div>
</div>
<script>
function tick() {
    document.getElementById('clock').innerText = new Date().toLocaleString('en-IN',{
        weekday:'long',year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'
    });
}
tick(); setInterval(tick,1000);
</script>
</body>
</html>
